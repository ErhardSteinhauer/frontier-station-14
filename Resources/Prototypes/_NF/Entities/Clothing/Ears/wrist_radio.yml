# region punk
- type: entity
  parent: [NFBaseClothingWristset, ClothingHeadsetService]
  id: NFClothingWristsetPunkCommon
  name: punk wristset
  components:
  - type: Sprite
    layers:
    - state: icon
      map: [ "wristsetBase" ]
    - state: icon-decal-01
      map: [ "wristsetDecal" ]
    - state: icon-unshaded
      shader: unshaded
      map: [ "wristsetScreen" ]
    - state: icon-buttons
      map: [ "wristsetButtons" ]
  - type: Clothing
    clothingVisuals:
      ears:
      - state: equipped-EARS
        map: [ "wristsetBase" ]
      - state: equipped-EARS-unshaded
        shader: unshaded
        map: [ "wristsetScreen" ]
  - type: RandomSprite
    available:
      - wristsetBase:
          icon: Cyberpunk
        wristsetDecal:
          icon-decal-01: CyberpunkNeon
          icon-decal-02: CyberpunkNeon
        wristsetButtons:
          icon-buttons: CyberpunkNeon
        wristsetScreen:
          icon-unshaded: CyberpunkNeon
