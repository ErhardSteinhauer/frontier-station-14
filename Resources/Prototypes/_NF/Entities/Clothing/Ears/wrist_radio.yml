# region Base Wristset
- type: entity
  abstract: true
  parent: ClothingHeadset
  id: NFBaseClothingWristset
  name: wristset
  description: An updated, modular intercom that fits over the wrist. Takes encryption keys.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Ears/Headsets/wrist_color.rsi
  - type: Clothing
    sprite: _NF/Clothing/Ears/Headsets/wrist_color.rsi
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon

# region NFSD (full)
- type: entity
  parent: [NFBaseClothingWristset, ClothingHeadsetNfsdBrown]
  id: NFClothingWristsetNfsdBrown
  name: NFSD wristset
  components:
  - type: Sprite
    layers:
    - state: icon
      color: "#63492a"
    - state: icon-unshaded
      color: "#52843f"
      shader: unshaded
    - state: icon-buttons
  - type: Clothing
    clothingVisuals:
      ears:
      - state: equipped-EARS
        color: "#63492a"
      - state: equipped-EARS-unshaded
