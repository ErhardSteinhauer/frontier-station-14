# region Base
- type: entity
  abstract: true
  id: NFBaseProximityMine
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
    fixedRotation: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.16,0.2,0.16"
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: RequireProjectileTarget
  - type: AmbientSound
    volume: -10
    range: 4
    enabled: true
    sound:
      path: /Audio/Items/newton_cradle.ogg
  - type: DeleteOnTrigger
  - type: OnUseTimerTrigger
    useVerbInstead: true
    beepInterval: .25
    beepSound:
      path: /Audio/Effects/beep_landmine.ogg
      params:
        volume: 1
    examinable: false
  - type: TriggerOnProximity
    triggerSpeed: 0
    shape:
      !type:PhysShapeCircle
        radius: 0.5
    repeating: false
    requiresAnchored: false
    whitelist:
      components:
        - Actor

# region base types
- type: entity
  abstract: true
  parent: NFBaseProximityMine
  id: NFBaseMineExplosive
  suffix: Frontier, Mine, Explosive
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Default
    maxIntensity: 20
    totalIntensity: 30 # about a ~3 tile radius
    canCreateVacuum: false

- type: entity
  abstract: true
  parent: NFBaseProximityMine
  id: NFBaseMineCryo
  suffix: Frontier, Mine, Cryo
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: Cryo
    maxIntensity: 10
    totalIntensity: 30 # about a ~3 tile radius
    canCreateVacuum: false

- type: entity
  abstract: true
  parent: NFBaseProximityMine
  id: NFBaseMineFire
  suffix: Frontier, Mine, Fire
  components:
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: FireBomb
    maxIntensity: 10
    totalIntensity: 30 # about a ~3 tile radius
    canCreateVacuum: false

- type: entity
  abstract: true
  parent: NFBaseProximityMine
  id: NFBaseMineEmp
  suffix: Frontier, Mine, EMP
  components:
  - type: EmpOnTrigger
    range: 6
    energyConsumption: 10000

- type: entity
  abstract: true
  parent: NFBaseProximityMine
  id: NFBaseMineFlash
  suffix: Frontier, Mine, Flash
  components:
  - type: FlashOnTrigger
    range: 6
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect

- type: entity
  abstract: true
  parent: NFBaseProximityMine
  id: NFBaseMineSmoke
  suffix: Frontier, Mine, Smoke
  components:
  - type: SmokeOnTrigger
    duration: 5
    spreadAmount: 5
  - type: SoundOnTrigger
    sound: /Audio/Effects/smoke.ogg
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/Smoke-grenade.ogg

