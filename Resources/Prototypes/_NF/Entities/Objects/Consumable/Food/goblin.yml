      food:
        maxVol: 50
        reagents:
        - ReagentId: Nutriment
          Quantity: 15
        - ReagentId: Vitamin
          Quantity: 5
        - ReagentId: FungalBeer
          Quantity: 5
        - ReagentId: Goblinol
          Quantity: 15
  - type: Tag
    tags:
    - Meat

