    - spaceshroom
    - jelly
  - type: Sprite
    sprite: _NF/Objects/Consumable/Food/meals.rsi
    state: goblin-spaceshroom-jelly
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents: # Higher values because you can't grow spaceshrooms - obtainable only through luck
