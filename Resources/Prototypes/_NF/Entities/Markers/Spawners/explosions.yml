# region random
- type: entity
  parent: MarkerBasePlaceFree
  id: NFSpawnShuttleWreckExplosionRandom
  name: shuttle explosion spawner
  suffix: Random
  components:
  - type: Sprite
    layers:
    - sprite: Objects/Weapons/Bombs/seismic.rsi
      state: icon
    - sprite: _NF/Markers/general.rsi
      state: questionmark
      color: red
  - type: EntityTableSpawner
    offset: 0.0
    table: !type:NestedSelector
      tableId: NFTableShuttleWreckExplosion
      prob: 1.00

